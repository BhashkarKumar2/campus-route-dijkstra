<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Campus Route Finder</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    >
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Route controls">
        <header class="brand">
          <div>
            <span class="eyebrow">{{ campus.get("campus_name", "Campus") }}</span>
            <h1>Campus Route Finder</h1>
          </div>
          <span class="status-pill">Dijkstra</span>
        </header>

        <section class="panel">
          <label class="field">
            <span>From</span>
            <select id="sourceSelect"></select>
          </label>

          <label class="field">
            <span>To</span>
            <select id="targetSelect"></select>
          </label>

          <div class="segmented" role="group" aria-label="Travel profile">
            <button class="segment active" type="button" data-profile="walk">Walk</button>
            <button class="segment" type="button" data-profile="fast_walk">Fast</button>
            <button class="segment" type="button" data-profile="cycle">Cycle</button>
          </div>

          <div class="button-row">
            <button id="routeButton" class="primary-button" type="button">
              <i data-lucide="route"></i>
              Find Route
            </button>
            <button id="swapButton" class="icon-button" type="button" title="Swap locations" aria-label="Swap locations">
              <i data-lucide="repeat-2"></i>
            </button>
          </div>
        </section>

        <section class="panel summary-panel" aria-live="polite">
          <div class="metric-grid">
            <div>
              <span class="metric-label">Time</span>
              <strong id="timeMetric">--</strong>
            </div>
            <div>
              <span class="metric-label">Distance</span>
              <strong id="distanceMetric">--</strong>
            </div>
            <div>
              <span class="metric-label">Stops</span>
              <strong id="stopsMetric">--</strong>
            </div>
          </div>
          <ol id="routeSteps" class="route-steps"></ol>
        </section>

        <section class="panel algorithm-panel">
          <div class="section-title">
            <h2>Dijkstra Trace</h2>
            <button id="copyTraceButton" class="icon-button small" type="button" title="Copy trace" aria-label="Copy trace">
              <i data-lucide="copy"></i>
            </button>
          </div>
          <div id="visitedOrder" class="visited-order">Run a route to see settled nodes.</div>
          <div id="traceList" class="trace-list"></div>
        </section>

        <section class="panel builder-panel">
          <div class="section-title">
            <h2>Node Builder</h2>
            <div class="toolbar">
              <button id="captureButton" class="icon-button small" type="button" title="Capture coordinates" aria-label="Capture coordinates">
                <i data-lucide="map-pin-plus"></i>
              </button>
              <button id="copyNodeButton" class="icon-button small" type="button" title="Copy node JSON" aria-label="Copy node JSON">
                <i data-lucide="clipboard"></i>
              </button>
              <button id="downloadGraphButton" class="icon-button small" type="button" title="Download graph JSON" aria-label="Download graph JSON">
                <i data-lucide="download"></i>
              </button>
            </div>
          </div>
          <pre id="nodeOutput" class="code-output">Select the pin button, then pick a map point.</pre>
        </section>

        <section class="panel official-map-panel">
          <div class="section-title">
            <h2>Official DTU Map</h2>
            <a class="text-link" href="{{ url_for('static', filename='img/dtu-official-campus-map.png') }}" target="_blank" rel="noreferrer">Open</a>
          </div>
          <img class="official-map-image" src="{{ url_for('static', filename='img/dtu-official-campus-map.png') }}" alt="Official Delhi Technological University campus map">
        </section>
      </aside>

      <main class="map-area">
        <div id="map" aria-label="Campus map"></div>
        <div class="map-toolbar" aria-label="Map tools">
          <button id="fitButton" class="icon-button" type="button" title="Fit graph" aria-label="Fit graph">
            <i data-lucide="locate-fixed"></i>
          </button>
          <button id="toggleGraphButton" class="icon-button active" type="button" title="Toggle graph" aria-label="Toggle graph">
            <i data-lucide="network"></i>
          </button>
        </div>
      </main>
    </div>

    <script>
      window.CAMPUS_META = {{ campus | tojson }};
    </script>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
